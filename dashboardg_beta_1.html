          const [filtroAnioIngreso, setFiltroAnioIngreso] = useState('Todos');
          const [filtroEstadoCierre, setFiltroEstadoCierre] = useState('CERRADO'); 

          const [limiteReprobaciones, setLimiteReprobaciones] = useState(3);
          const [filtroEstadoAprobacion, setFiltroEstadoAprobacion] = useState('Todos'); 
          const [busquedaAlumno, setBusquedaAlumno] = useState('');

          const [notificacion, setNotificacion] = useState(null);

          const formatNota = (nota) => {
            if (nota === null || nota === undefined || nota === '') return 'S/N';
            const num = typeof nota === 'number' ? nota : parseFloat(String(nota).replace(',', '.'));
            return isNaN(num) ? String(nota) : num.toFixed(1);
          };

          const parseCSV = (text) => {
            const lines = text.split(/\r?\n/);
            if (lines.length < 2) return [];

            const headerLine = lines[0];
            const separator = headerLine.includes(';') ? ';' : ',';

            const parseLine = (line) => {
              const result = [];
              let current = '';
              let inQuotes = false;
              for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                  inQuotes = !inQuotes;
                } else if (char === separator && !inQuotes) {
                  result.push(current.trim());
                  current = '';
                } else {
                  current += char;
                }
              }
              result.push(current.trim());
              return result;
            };

            const headers = parseLine(headerLine).map(h => h.replace(/^"|"$/g, '').trim());

            const getIndex = (possibleNames) => {
              return headers.findIndex(h => possibleNames.some(p => h.toLowerCase() === p.toLowerCase()));
            };

            const idx = {
              sede: getIndex(['sede']),
              anio: getIndex(['año', 'anio']),
              periodo: getIndex(['período', 'periodo']),
              codCarrera: getIndex(['código carrera', 'codigo carrera', 'cod. carrera', 'codigo_carrera']),
              nomCarrera: getIndex(['nombre carrera', 'nombre_carrera']),
              codAsig: getIndex(['código asignatura', 'codigo asignatura', 'cod. asignatura', 'codigo_asignatura']),
              nomAsig: getIndex(['nombre asignatura', 'nombre_asignatura']),
              estadoAsig: getIndex(['estado asignatura', 'estado_asignatura']),
              rut: getIndex(['rut']),
              dv: getIndex(['dv']),
              nombres: getIndex(['nombres']),
              apPaterno: getIndex(['ap.paterno', 'ap paterno', 'apellido paterno']),
              apMaterno: getIndex(['ap.materno', 'ap materno', 'ap_materno', 'apellido materno']),
              nota: getIndex(['nota final', 'nota_final', 'nota']),
              condicion: getIndex(['condicion de alumno/carrera', 'condicion de alumno', 'condicion', 'condición de alumno/carrera']),
              creditos: getIndex(['creditos', 'créditos']),
              anioIngreso: getIndex(['año de ingreso', 'anio de ingreso', 'anio_ingreso']),
              plan: getIndex(['plan de estudios', 'plan_de_estudios', 'plan']),
              nivel: getIndex(['nivel'])
            };

            const rows = [];
            for (let i = 1; i < lines.length; i++) {
              if (!lines[i].trim()) continue;
              const values = parseLine(lines[i]);
              
              const getValue = (headerIndex) => {
                if (headerIndex === -1 || headerIndex >= values.length) return '';
                return values[headerIndex].replace(/^"|"$/g, '').trim();
              };

              const rutVal = getValue(idx.rut);
              if (!rutVal) continue;

              let notaRaw = getValue(idx.nota);
              let notaNum = parseFloat(notaRaw.replace(',', '.'));
              if (isNaN(notaNum)) notaNum = null;

              rows.push({
                Sede: getValue(idx.sede),
                Año: getValue(idx.anio),
                Período: getValue(idx.periodo),
                CodigoCarrera: getValue(idx.codCarrera),
                NombreCarrera: getValue(idx.nomCarrera),
                CodigoAsignatura: getValue(idx.codAsig),
                NombreAsignatura: getValue(idx.nomAsig),
                EstadoAsignatura: getValue(idx.estadoAsig),
                Rut: rutVal,
                Dv: getValue(idx.dv),
                Nombres: getValue(idx.nombres),
                ApPaterno: getValue(idx.apPaterno),
                ApMaterno: getValue(idx.apMaterno),
                NotaFinal: notaNum,
                Condicion: getValue(idx.condicion).toUpperCase(),
                Creditos: getValue(idx.creditos),
                AnioIngreso: getValue(idx.anioIngreso),
                PlanEstudios: getValue(idx.plan),
                Nivel: getValue(idx.nivel)
              });
            }

            return rows;
          };

          const handleFileUpload = (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            let totalParsedRows = [];
            let filesProcessed = 0;
            const nuevosNombresArchivos = files.map(file => file.name);

            files.forEach(file => {
              const reader = new FileReader();
              reader.onload = (event) => {
                const text = event.target.result;
                const parsed = parseCSV(text);
                totalParsedRows = [...totalParsedRows, ...parsed];
                filesProcessed++;

                if (filesProcessed === files.length) {
                  setData(prev => {
                    const key = (r) => `${r.Rut}-${r.CodigoAsignatura}-${r.Año}-${r.Período}`;
                    const existingMap = new Map();
                    const baseData = prev === DATOS_EJEMPLO ? [] : prev;
                    
                    [...baseData, ...totalParsedRows].forEach(item => {
                      existingMap.set(key(item), item);
                    });
                    return Array.from(existingMap.values());
                  });

                  setArchivosCargados(prev => {
                    const unicos = new Set([...prev, ...nuevosNombresArchivos]);
                    return Array.from(unicos);
                  });

                  setNotificacion({
                    tipo: 'success',
                    mensaje: `¡Excelente! Se cargaron con éxito ${totalParsedRows.length} registros desde ${files.length} archivo(s).`
                  });
                  setTimeout(() => setNotificacion(null), 6000);
                }
              };
              reader.readAsText(file, 'UTF-8');
            });
          };

            const agrupado = {};

              if (!agrupado[key]) {

                  Rut: row.Rut,
                  Dv: row.Dv,
                  Nombres: row.Nombres,
                  ApPaterno: row.ApPaterno,
                  ApMaterno: row.ApMaterno,
                  CodigoAsignatura: row.CodigoAsignatura,
                  NombreAsignatura: row.NombreAsignatura,
                  NombreCarrera: row.NombreCarrera,
                  PlanEstudios: row.PlanEstudios,
                  Reprobaciones: 0,
                  Aprobado: false,
                  HistorialNotas: [],
                  Nivel: row.Nivel

              agrupado[key].HistorialNotas.push({
                Anio: row.Año,
                Periodo: row.Período,
                Nota: row.NotaFinal,
                Condicion: row.Condicion,
                EstadoAsig: row.EstadoAsignatura
              });

              if (row.Condicion === 'REPROBADO') {
                agrupado[key].Reprobaciones += 1;
              }
              if (row.Condicion === 'APROBADO' || row.Condicion === 'CONVALIDADO') {
                agrupado[key].Aprobado = true;
              }
            });

            return Object.values(agrupado)
              .filter(item => {
                if (item.Reprobaciones < limiteReprobaciones) return false;
                if (filtroEstadoAprobacion === 'Aprobado' && !item.Aprobado) return false;
                if (filtroEstadoAprobacion === 'No Aprobado' && item.Aprobado) return false;

                if (busquedaAlumno.trim() !== '') {
                  const query = busquedaAlumno.toLowerCase();
                  const nombreCompleto = `${item.Nombres} ${item.ApPaterno} ${item.ApMaterno}`.toLowerCase();
                  const rutCompleto = `${item.Rut}-${item.Dv}`.toLowerCase();
                  if (!nombreCompleto.includes(query) && !rutCompleto.includes(query)) return false;
                }

                return true;
              })
              .sort((a, b) => b.Reprobaciones - a.Reprobaciones);

                    Nombre: row.NombreAsignatura,

                    InscripcionesTotales: 0,

              alertasPermanencia
                .filter(al => al.Reprobaciones >= 3 && !al.Aprobado)
                .map(al => al.Rut)
            ).size;

            return {
              tasaAprobacionGlobal,
              totalAprobados,
              totalReprobados,
              alumnosUnicos,
              alumnosEnRiesgoUnicos,
              totalEvaluaciones: totalRegistrosValidos.length
            };

                                        </td>
                                        <td className="py-3.5 px-4 text-xs">
                                          <p className="text-slate-300 truncate max-w-[200px]">{alumno.Carrera.replace('-PUERTO MONTT', '')}</p>
                                          <p className="text-slate-500">Plan: {alumno.Plan}</p>
                                        </td>
                                        <td className="py-3.5 px-4 text-center font-mono">{alumno.TotalCursadas}</td>
                                        <td className="py-3.5 px-4 text-center font-mono text-emerald-400 font-bold">{alumno.Aprobadas}</td>
                                        <td className="py-3.5 px-4 text-right">
                                          <div className="flex items-center justify-end gap-2">
                                            <span className="font-mono font-bold text-slate-200">{alumno.PorcentajeAvance}%</span>
                                            <div className="w-16 bg-slate-900 h-2 rounded-full overflow-hidden">
                                              <div className={`${colorAvance} h-2 rounded-full`} style={{ width: `${pctNum}%` }}></div>
                                            </div>
                                          </div>
                                        </td>
                                      </tr>
                                    );
                                  })}
                              </tbody>
                            </table>
                          </div>
                        )}
                        <div className="mt-4 text-xs text-slate-500 text-right">
                          Mostrando los primeros 15 registros filtrados. Usa el cuadro de búsqueda para ver casos específicos.
                        </div>
                      </div>
                    </div>
                  )}

                  {activeTab === 'carga' && (
                    <div className="space-y-6 animate-fadeIn">
                      <div className="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
                        <h3 className="font-bold text-white text-base mb-2">Motor de Procesamiento Local de Reportes (CSV)</h3>
                        <p className="text-sm text-slate-400 mb-6">
                          Este módulo te permite cargar directamente los archivos originales de Excel guardados como <code className="text-slate-200 font-mono bg-slate-950 px-1 py-0.5 rounded">.csv</code>. 
                          El procesamiento de datos se ejecuta 100% de manera interna dentro de tu propio explorador, garantizando máxima velocidad y total privacidad institucional.
                        </p>

                        <div className="border-2 border-dashed border-slate-600 hover:border-indigo-500 bg-slate-900 rounded-xl p-8 text-center transition-colors cursor-pointer relative">
                          <input
                            type="file"
                            multiple
                            accept=".csv"
                            onChange={handleFileUpload}
                            className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                          />
                          <div className="space-y-3 pointer-events-none">
                            <svg className="w-12 h-12 text-slate-500 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                            </svg>
                            <p className="text-base text-slate-200 font-semibold">Selecciona o arrastra tus archivos .csv aquí</p>
                            <p className="text-xs text-slate-500">Puedes subir múltiples archivos de carreras simultáneamente (REPORTE_3218, REPORTE_3216, etc.)</p>
                          </div>
                        </div>

                        <div className="mt-8 bg-slate-900/60 p-5 rounded-lg border border-slate-800">
                          <h4 className="font-bold text-sm text-slate-200 mb-2">Guía paso a paso para exportar desde Excel:</h4>
                          <ol className="list-decimal pl-5 text-xs text-slate-400 space-y-2">
                            <li>Abre tu planilla original de Excel (<code className="text-indigo-400 font-mono">REPORTE_3218.xlsx</code>, etc.).</li>
                            <li>Haz clic en <strong>Archivo</strong> &gt; <strong>Guardar como</strong>.</li>
                            <li>En la lista desplegable de Tipo de archivo, selecciona <strong>CSV (delimitado por comas) (*.csv)</strong>.</li>
                            <li>Guarda el archivo y arrástralo en la zona de carga de arriba. ¡El dashboard interpretará automáticamente las columnas y actualizará los KPIs de manera instantánea!</li>
                          </ol>
                        </div>
                      </div>
                    </div>
                  )}

                </div>
              </main>

              <footer className="bg-slate-950 border-t border-slate-800 text-slate-500 py-6 mt-12 text-center text-xs">
                <p>© 2026 SAPE - Sistema de Alertas y Permanencia de Estudiantes para Carreras de Ingeniería.</p>
                <p className="mt-1">Diseñado bajo principios de usabilidad y protección de datos académicos locales.</p>
              </footer>
            </div>
          );
        }

        // 6. Finalmente, le decimos a ReactDOM que monte nuestra App en el div "root"
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
