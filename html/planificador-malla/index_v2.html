<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Plan de Estudio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (para JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Phosphor Icons (reemplazo de Lucide para versión web sin bundler) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* Ocultar las flechas de los inputs numéricos (spinners) siempre */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        @media print {
            @page { 
                size: landscape; 
                margin: 5mm; /* Margen reducido para maximizar espacio */
            }
            body { 
                background-color: white !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
                font-size: 11px; /* Reducir ligeramente la fuente para que quepa todo */
            }
            .no-print { display: none !important; }
            
            /* Convertir los campos de texto/número a texto plano visualmente */
            input {
                border: none !important;
                background: transparent !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
                outline: none !important;
                color: black !important;
            }

            /* Forzar una cuadrícula exacta de 5 columnas (Semestre I-V arriba, VI-X abajo) */
            .print-grid {
                display: grid !important;
                grid-template-columns: repeat(5, 1fr) !important;
                gap: 8px !important; /* Espacio entre columnas reducido */
                width: 100% !important;
                padding: 0 !important;
            }
            
            .print-col {
                width: 100% !important; 
                margin-bottom: 0 !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                border: 1px solid #cbd5e1 !important; /* Borde gris sutil */
                box-shadow: none !important;
            }

            /* Reducir los márgenes y rellenos internos para ahorrar espacio vertical */
            .print-col > div {
                padding: 6px !important;
            }
            .print-col > div:nth-child(2) > div {
                padding: 6px !important;
                margin-bottom: 4px !important;
                box-shadow: none !important;
                border: 1px solid #e2e8f0 !important;
            }
            
            /* Ocultar colores rojos de alerta al imprimir para un look más formal */
            .border-red-400 { border-color: #cbd5e1 !important; }
            .bg-red-100 { background-color: transparent !important; }
            .text-red-700 { color: #334155 !important; font-weight: normal !important; }
            .text-red-600 { color: #475569 !important; }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const SCT_MULTIPLIER = 17 / 27;

        const calcularSCT = (dd, ta) => {
            const total = (Number(dd) + Number(ta)) * SCT_MULTIPLIER;
            return isNaN(total) ? 0 : Math.round(total);
        };

        const INITIAL_DATA = [
            { id: 1, title: 'Semestre I', courses: [
                { id: '1-1', name: 'Cálculo I', dd: 6, ta: 6, isLocked: false },
                { id: '1-2', name: 'Álgebra I', dd: 6, ta: 6, isLocked: false },
                { id: '1-3', name: 'Programación', dd: 4, ta: 4, isLocked: false },
                { id: '1-4', name: 'Taller de Introducción a la Ingeniería', dd: 2, ta: 2, isLocked: false },
                { id: '1-5', name: 'Hab. com. para Ingenieros', dd: 2, ta: 3, isLocked: false }
            ]},
            { id: 2, title: 'Semestre II', courses: [
                { id: '2-1', name: 'Cálculo II', dd: 6, ta: 6, isLocked: false },
                { id: '2-2', name: 'Álgebra II', dd: 6, ta: 6, isLocked: false },
                { id: '2-3', name: 'Física Mecánica', dd: 5, ta: 5, isLocked: false },
                { id: '2-4', name: 'Química', dd: 4, ta: 4, isLocked: false },
                { id: '2-5', name: 'Ciudadanía para el buen vivir', dd: 2, ta: 2, isLocked: false }
            ]},
            { id: 3, title: 'Semestre III', courses: [
                { id: '3-1', name: 'Cálculo Multivariable', dd: 6, ta: 6, isLocked: false },
                { id: '3-2', name: 'Electromagnetismo', dd: 5, ta: 5, isLocked: false },
                { id: '3-3', name: 'Inglés I', dd: 2, ta: 3, isLocked: false }
            ]},
            { id: 4, title: 'Semestre IV', courses: [
                { id: '4-1', name: 'Ecuaciones Diferenciales', dd: 6, ta: 6, isLocked: false },
                { id: '4-2', name: 'Física Disciplinar', dd: 5, ta: 5, isLocked: false },
                { id: '4-3', name: 'Inglés II', dd: 2, ta: 3, isLocked: false }
            ]},
            { id: 5, title: 'Semestre V', courses: [
                { id: '5-1', name: 'Cálculo Numérico', dd: 4, ta: 4, isLocked: false },
                { id: '5-2', name: 'Estadística y Probabilidad', dd: 4, ta: 4, isLocked: false },
                { id: '5-3', name: 'Inglés III', dd: 2, ta: 3, isLocked: false },
                { id: '5-4', name: 'Economía', dd: 3, ta: 3, isLocked: false }
            ]},
            { id: 6, title: 'Semestre VI', courses: [
                { id: '6-1', name: 'Inglés para Ingenieros', dd: 2, ta: 3, isLocked: false },
                { id: '6-2', name: 'Investigación Operativa', dd: 4, ta: 4, isLocked: false }
            ]},
            { id: 7, title: 'Semestre VII', courses: [
                { id: '7-1', name: 'Inglés Técnico "Especialidad"', dd: 2, ta: 3, isLocked: false },
                { id: '7-2', name: 'Formulación y Evaluación de Proy.', dd: 4, ta: 4, isLocked: false }
            ]},
            { id: 8, title: 'Semestre VIII', courses: [
                { id: '8-1', name: 'Electivo Profesional', dd: 4, ta: 4, isLocked: false },
                { id: '8-2', name: 'Taller U-Lab Disciplinar I', dd: 4, ta: 6, isLocked: false }
            ]},
            { id: 9, title: 'Semestre IX', courses: [
                { id: '9-1', name: 'Electivo Profesional', dd: 4, ta: 4, isLocked: false },
                { id: '9-2', name: 'Taller U-Lab Disciplinar II', dd: 4, ta: 6, isLocked: false },
                { id: '9-3', name: 'Anteproyecto de Título', dd: 2, ta: 4, isLocked: false }
            ]},
            { id: 10, title: 'Semestre X', courses: [
                { id: '10-1', name: 'Proyecto de Título', dd: 0, ta: 20, isLocked: false },
                { id: '10-2', name: 'Práctica Profesional', dd: 0, ta: 0, isLocked: false }
            ]}
        ];

        function App() {
            const [semesters, setSemesters] = React.useState(INITIAL_DATA);
            const fileInputRef = React.useRef(null);

            const handleNew = () => setSemesters(INITIAL_DATA);

            const handleSave = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(semesters, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "plan_de_estudio.json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const handleLoad = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const loadedData = JSON.parse(event.target.result);
                        setSemesters(loadedData);
                    } catch (error) {
                        console.error("Error al leer el archivo JSON", error);
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const handlePrint = () => window.print();

            const addCourse = (semesterId) => {
                setSemesters(semesters.map(sem => {
                    if (sem.id === semesterId) {
                        return { ...sem, courses: [...sem.courses, { id: Date.now().toString(), name: 'Nueva Asignatura', dd: 0, ta: 0, isLocked: false }] };
                    }
                    return sem;
                }));
            };

            const removeCourse = (semesterId, courseId) => {
                setSemesters(semesters.map(sem => {
                    if (sem.id === semesterId) {
                        return { ...sem, courses: sem.courses.filter(c => c.id !== courseId) };
                    }
                    return sem;
                }));
            };

            const updateCourse = (semesterId, courseId, field, value) => {
                setSemesters(semesters.map(sem => {
                    if (sem.id === semesterId) {
                        return { ...sem, courses: sem.courses.map(c => c.id === courseId ? { ...c, [field]: value } : c) };
                    }
                    return sem;
                }));
            };

            const toggleLockCourse = (semesterId, courseId) => {
                setSemesters(semesters.map(sem => {
                    if (sem.id === semesterId) {
                        return { ...sem, courses: sem.courses.map(c => c.id === courseId ? { ...c, isLocked: !c.isLocked } : c) };
                    }
                    return sem;
                }));
            };

            const calculateSemesterStats = (courses) => {
                return courses.reduce((acc, course) => {
                    return {
                        sct: acc.sct + calcularSCT(course.dd, course.ta),
                        dd: acc.dd + (Number(course.dd) || 0),
                        ta: acc.ta + (Number(course.ta) || 0)
                    };
                }, { sct: 0, dd: 0, ta: 0 });
            };

            const getYearlySCT = (semesterId) => {
                const isOdd = semesterId % 2 !== 0;
                const pairId = isOdd ? semesterId + 1 : semesterId - 1;
                const currentSem = semesters.find(s => s.id === semesterId);
                const pairedSem = semesters.find(s => s.id === pairId);

                const currentSCT = currentSem ? calculateSemesterStats(currentSem.courses).sct : 0;
                const pairedSCT = pairedSem ? calculateSemesterStats(pairedSem.courses).sct : 0;

                return currentSCT + pairedSCT;
            };

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col font-sans">
                    <header className="bg-slate-900 text-white p-4 shadow-md shrink-0 no-print">
                        <div className="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <i className="ph ph-book-open text-blue-400 text-3xl"></i>
                                <div>
                                    <h1 className="text-xl sm:text-2xl font-bold">Planificador de Plan de Estudio</h1>
                                    <p className="text-slate-400 text-xs sm:text-sm mt-1">Límites: Max 20 hrs DD sem. | Max 48 hrs Totales sem. | Max 33 SCT sem. | Max 60 SCT anual</p>
                                </div>
                            </div>

                            <div className="flex flex-wrap gap-2">
                                <button onClick={handleNew} className="flex items-center gap-1.5 bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded text-sm transition-colors border border-slate-700" title="Nuevo Plan en Blanco">
                                    <i className="ph ph-file-plus text-lg"></i> <span className="hidden sm:inline">Nuevo</span>
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-1.5 bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded text-sm transition-colors border border-slate-700" title="Abrir Archivo (.json)">
                                    <i className="ph ph-folder-open text-lg"></i> <span className="hidden sm:inline">Abrir</span>
                                </button>
                                <input type="file" accept=".json" ref={fileInputRef} onChange={handleLoad} className="hidden" />
                                <button onClick={handleSave} className="flex items-center gap-1.5 bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded text-sm transition-colors border border-slate-700" title="Guardar a Archivo (.json)">
                                    <i className="ph ph-floppy-disk text-lg"></i> <span className="hidden sm:inline">Guardar</span>
                                </button>
                                <div className="w-px h-8 bg-slate-700 mx-1 hidden sm:block"></div>
                                <button onClick={handlePrint} className="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm font-semibold transition-colors shadow-sm" title="Guardar como PDF / Imprimir">
                                    <i className="ph ph-printer text-lg"></i> <span className="hidden sm:inline">Exportar PDF</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="hidden print:block text-center mb-6 pt-4">
                        <h1 className="text-2xl font-bold text-slate-800">Malla Curricular - Plan de Estudio</h1>
                        <p className="text-sm text-slate-500 mt-1">Exportado desde Planificador de Plan de Estudio</p>
                    </div>

                    <main className="flex-1 overflow-x-auto p-6 print:overflow-visible print:p-0">
                        <div className="flex gap-6 items-start pb-4 w-max print-grid">
                            {semesters.map((semester) => {
                                const stats = calculateSemesterStats(semester.courses);
                                const totalHours = stats.dd + stats.ta;
                                const isDDOverLimit = stats.dd > 20;
                                const isTotalOverLimit = totalHours > 48;
                                const isSCTOverLimit = stats.sct > 33;
                                const yearlySCT = getYearlySCT(semester.id);
                                const isYearlySCTOverLimit = yearlySCT > 60;
                                const yearNumber = Math.ceil(semester.id / 2);
                                const hasErrors = isDDOverLimit || isTotalOverLimit || isSCTOverLimit || isYearlySCTOverLimit;

                                return (
                                    <div key={semester.id} className={`bg-slate-200 rounded-xl flex flex-col w-80 shadow-sm border transition-colors print-col print:bg-slate-100 ${hasErrors ? 'border-red-400 shadow-red-200 print:border-red-400' : 'border-slate-300'}`}>
                                        <div className="p-4 bg-slate-300 rounded-t-xl border-b border-slate-400 flex flex-col gap-3 print:bg-slate-200">
                                            <div className="flex justify-between items-start">
                                                <h2 className="font-bold text-slate-800 mt-1">{semester.title}</h2>
                                                <div className="flex flex-col items-end">
                                                    <span className={`text-xs font-bold px-2 py-1 rounded-full flex items-center gap-1 ${isSCTOverLimit ? 'bg-red-500 text-white print:border print:border-red-600 print:text-red-600 print:bg-transparent' : 'bg-blue-600 text-white print:border print:border-slate-600 print:text-slate-800 print:bg-transparent'}`} title={isSCTOverLimit ? 'Supera el límite de 33 SCT por semestre' : ''}>
                                                        {stats.sct} SCT
                                                        {isSCTOverLimit && <i className="ph ph-warning text-sm no-print"></i>}
                                                    </span>
                                                    <span className={`text-[10px] mt-1 font-semibold flex items-center gap-1 ${isYearlySCTOverLimit ? 'text-red-600' : 'text-slate-600'}`} title={isYearlySCTOverLimit ? 'Supera el límite de 60 SCT anuales' : ''}>
                                                        Año {yearNumber}: {yearlySCT} SCT
                                                        {isYearlySCTOverLimit && <i className="ph ph-warning text-sm no-print"></i>}
                                                    </span>
                                                </div>
                                            </div>
                                            
                                            <div className="flex flex-col gap-1.5 text-xs bg-white/50 p-2 rounded-lg print:bg-white/80">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-slate-600 font-medium">Docencia Directa:</span>
                                                    <span className={`font-bold flex items-center gap-1 px-1.5 py-0.5 rounded ${isDDOverLimit ? 'bg-red-100 text-red-700 print:border print:border-red-300' : 'text-slate-700'}`}>
                                                        {stats.dd} hrs
                                                        {isDDOverLimit && <i className="ph ph-warning text-sm no-print"></i>}
                                                    </span>
                                                </div>
                                                <div className="flex justify-between items-center">
                                                    <span className="text-slate-600 font-medium">Trabajo Autónomo:</span>
                                                    <span className="font-bold text-slate-700 pr-1">{stats.ta} hrs</span>
                                                </div>
                                                <div className="flex justify-between items-center pt-1.5 mt-0.5 border-t border-slate-300">
                                                    <span className="text-slate-700 font-semibold">Carga Semanal:</span>
                                                    <span className={`font-bold flex items-center gap-1 px-1.5 py-0.5 rounded ${isTotalOverLimit ? 'bg-red-100 text-red-700 print:border print:border-red-300' : 'text-slate-800'}`}>
                                                        {totalHours} hrs
                                                        {isTotalOverLimit && <i className="ph ph-warning text-sm no-print"></i>}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="p-3 flex flex-col gap-3 overflow-y-auto max-h-[60vh] print:max-h-none print:overflow-visible">
                                            {semester.courses.map((course) => (
                                                <div key={course.id} className={`rounded-lg shadow-sm border p-3 relative group transition-all print:break-inside-avoid ${course.isLocked ? 'bg-slate-50 border-slate-300 print:bg-white print:border-slate-300' : 'bg-white border-slate-200 hover:shadow-md'}`}>
                                                    <div className="absolute top-2 right-2 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity no-print bg-white/90 p-1 rounded">
                                                        <button onClick={() => toggleLockCourse(semester.id, course.id)} className={`hover:text-blue-600 transition-colors ${course.isLocked ? 'text-blue-500 opacity-100' : 'text-slate-400'}`} title={course.isLocked ? "Desbloquear" : "Bloquear edición"}>
                                                            {course.isLocked ? <i className="ph-fill ph-lock-key text-base"></i> : <i className="ph ph-lock-key-open text-base"></i>}
                                                        </button>
                                                        
                                                        {!course.isLocked && (
                                                            <button onClick={() => removeCourse(semester.id, course.id)} className="text-slate-400 hover:text-red-500 transition-colors" title="Eliminar asignatura">
                                                                <i className="ph ph-trash text-base"></i>
                                                            </button>
                                                        )}
                                                    </div>
                                                    
                                                    <input type="text" value={course.name} disabled={course.isLocked} onChange={(e) => updateCourse(semester.id, course.id, 'name', e.target.value)} className={`w-full font-semibold border-none focus:ring-0 p-0 text-sm mb-3 bg-transparent print:text-slate-900 ${course.isLocked ? 'text-slate-700 cursor-not-allowed' : 'text-slate-800'}`} placeholder="Nombre de la asignatura" />
                                                    
                                                    <div className="grid grid-cols-2 gap-2 text-xs">
                                                        <div className="flex flex-col">
                                                            <label className="text-slate-500 mb-1">Doc. Directa</label>
                                                            <input type="number" min="0" disabled={course.isLocked} value={course.dd} onChange={(e) => updateCourse(semester.id, course.id, 'dd', e.target.value)} className={`border rounded px-2 py-1 outline-none print:border-none print:px-0 print:font-semibold print:text-slate-800 ${course.isLocked ? 'border-transparent bg-transparent text-slate-700 cursor-not-allowed pl-0 font-medium' : 'border-slate-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white'}`} />
                                                        </div>
                                                        <div className="flex flex-col">
                                                            <label className="text-slate-500 mb-1">Trab. Autónomo</label>
                                                            <input type="number" min="0" disabled={course.isLocked} value={course.ta} onChange={(e) => updateCourse(semester.id, course.id, 'ta', e.target.value)} className={`border rounded px-2 py-1 outline-none print:border-none print:px-0 print:font-semibold print:text-slate-800 ${course.isLocked ? 'border-transparent bg-transparent text-slate-700 cursor-not-allowed pl-0 font-medium' : 'border-slate-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white'}`} />
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="mt-3 pt-2 border-t border-slate-100 flex justify-between items-center print:border-slate-200">
                                                        <span className="text-xs font-medium text-slate-500">SCT:</span>
                                                        <span className="text-sm font-bold text-blue-700 bg-blue-50 px-2 py-0.5 rounded print:bg-transparent print:px-0">
                                                            {calcularSCT(course.dd, course.ta)}
                                                        </span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="p-3 no-print">
                                            <button onClick={() => addCourse(semester.id)} className="w-full flex items-center justify-center gap-2 text-sm text-slate-600 hover:text-slate-900 bg-slate-100 hover:bg-white border border-slate-300 border-dashed rounded-lg py-2 transition-colors">
                                                <i className="ph ph-plus text-base"></i> Añadir Asignatura
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
