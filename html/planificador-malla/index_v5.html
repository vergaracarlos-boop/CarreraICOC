<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Plan de Estudio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (para JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @media print {
            @page { 
                size: landscape; 
                margin: 8mm 10mm; 
            }
            body { 
                background-color: white !important; 
                color: #000 !important;
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            .no-print { 
                display: none !important; 
            }
            
            /* Contenedor de cuadrícula 2x5 para los 10 semestres */
            .print-grid {
                display: grid !important;
                grid-template-columns: repeat(5, minmax(0, 1fr)) !important;
                grid-template-rows: auto auto !important;
                gap: 8px !important;
                width: 100% !important;
                max-width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                overflow: visible !important;
            }
            
            /* Columnas de Semestre estructuradas */
            .print-col {
                width: 100% !important;
                margin-bottom: 0 !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                background-color: #f8fafc !important; /* slate-50 */
                border: 1px solid #cbd5e1 !important; /* slate-300 */
                border-radius: 6px !important;
                display: flex !important;
                flex-direction: column !important;
                height: auto !important;
            }

            /* Contenedor interno de cursos */
            .print-courses-container {
                display: flex !important;
                flex-direction: column !important;
                gap: 6px !important;
                padding: 6px !important;
                overflow: visible !important;
                max-height: none !important;
            }

            /* Forzar el comportamiento de página única limpia */
            html, body, #root {
                height: auto !important;
                min-height: 0 !important;
                overflow: visible !important;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const SCT_MULTIPLIER = 17 / 27;

        const calcularSCT = (dd, ta) => {
            const total = (Number(dd) + Number(ta)) * SCT_MULTIPLIER;
            return isNaN(total) ? 0 : Math.round(total);
        };

        const INITIAL_DATA = [
            { id: 1, title: 'Semestre I', courses: [
                { id: '1-1', name: 'Cálculo I', dd: 6, ta: 6, isLocked: false },
                { id: '1-2', name: 'Álgebra I', dd: 6, ta: 6, isLocked: false },
                { id: '1-3', name: 'Programación', dd: 4, ta: 4, isLocked: false },
                { id: '1-4', name: 'Taller de Introducción a la Ingeniería', dd: 2, ta: 2, isLocked: false },
                { id: '1-5', name: 'Hab. com. para Ingenieros', dd: 2, ta: 3, isLocked: false }
            ]},
            { id: 2, title: 'Semestre II', courses: [
                { id: '2-1', name: 'Cálculo II', dd: 6, ta: 6, isLocked: false },
                { id: '2-2', name: 'Álgebra II', dd: 6, ta: 6, isLocked: false },
                { id: '2-3', name: 'Física Mecánica', dd: 5, ta: 5, isLocked: false },
                { id: '2-4', name: 'Química', dd: 4, ta: 4, isLocked: false },
                { id: '2-5', name: 'Ciudadanía para el buen vivir', dd: 2, ta: 2, isLocked: false }
            ]},
            { id: 3, title: 'Semestre III', courses: [
                { id: '3-1', name: 'Cálculo Multivariable', dd: 6, ta: 6, isLocked: false },
                { id: '3-2', name: 'Electromagnetismo', dd: 5, ta: 5, isLocked: false },
                { id: '3-3', name: 'Inglés I', dd: 2, ta: 3, isLocked: false }
            ]},
            { id: 4, title: 'Semestre IV', courses: [
                { id: '4-1', name: 'Ecuaciones Diferenciales', dd: 6, ta: 6, isLocked: false },
                { id: '4-2', name: 'Física Disciplinar', dd: 5, ta: 5, isLocked: false },
                { id: '4-3', name: 'Inglés II', dd: 2, ta: 3, isLocked: false }
            ]},
            { id: 5, title: 'Semestre V', courses: [
                { id: '5-1', name: 'Cálculo Numérico', dd: 4, ta: 4, isLocked: false },
                { id: '5-2', name: 'Estadística y Probabilidad', dd: 4, ta: 4, isLocked: false },
                { id: '5-3', name: 'Inglés III', dd: 2, ta: 3, isLocked: false },
                { id: '5-4', name: 'Economía', dd: 3, ta: 3, isLocked: false }
            ]},
            { id: 6, title: 'Semestre VI', courses: [
                { id: '6-1', name: 'Inglés para Ingenieros', dd: 2, ta: 3, isLocked: false },
                { id: '6-2', name: 'Investigación Operativa', dd: 4, ta: 4, isLocked: false }
            ]},
            { id: 7, title: 'Semestre VII', courses: [
                { id: '7-1', name: 'Inglés Técnico "Especialidad"', dd: 2, ta: 3, isLocked: false },
                { id: '7-2', name: 'Formulación y Evaluación de Proy.', dd: 4, ta: 4, isLocked: false }
            ]},
            { id: 8, title: 'Semestre VIII', courses: [
                { id: '8-1', name: 'Electivo Profesional', dd: 4, ta: 4, isLocked: false },
                { id: '8-2', name: 'Taller U-Lab Disciplinar I', dd: 4, ta: 6, isLocked: false }
            ]},
            { id: 9, title: 'Semestre IX', courses: [
                { id: '9-1', name: 'Electivo Profesional', dd: 4, ta: 4, isLocked: false },
                { id: '9-2', name: 'Taller U-Lab Disciplinar II', dd: 4, ta: 6, isLocked: false },
                { id: '9-3', name: 'Anteproyecto de Título', dd: 2, ta: 4, isLocked: false }
            ]},
            { id: 10, title: 'Semestre X', courses: [
                { id: '10-1', name: 'Proyecto de Título', dd: 0, ta: 20, isLocked: false },
                { id: '10-2', name: 'Práctica Profesional', dd: 0, ta: 0, isLocked: false }
            ]}
        ];

        function App() {
            const [semesters, setSemesters] = React.useState(INITIAL_DATA);
            const [careerName, setCareerName] = React.useState('Plan de Estudio: Ingeniería Civil Informática');
            const [currentFileName, setCurrentFileName] = React.useState(null); 
            const [isEditingCareer, setIsEditingCareer] = React.useState(false);
            const [tempCareerName, setTempCareerName] = React.useState('');
            const fileInputRef = React.useRef(null);

            const downloadJson = (data, filename) => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", filename);
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const handleNew = () => {
                setSemesters(INITIAL_DATA);
                setCareerName('Plan de Estudio: Ingeniería Civil Informática');
                setCurrentFileName(null);
            };

            const handleSave = () => {
                if (!currentFileName) {
                    handleSaveAs();
                    return;
                }
                const payload = { careerName, semesters };
                const fileName = currentFileName.endsWith('.json') ? currentFileName : `${currentFileName}.json`;
                downloadJson(payload, fileName);
            };

            const handleSaveAs = async () => {
                // Extraer el nombre base sin la extensión para que el usuario solo edite el nombre
                const baseName = currentFileName 
                    ? currentFileName.replace(/\.json$/i, '') 
                    : `malla_${careerName.toLowerCase().replace(/[^a-z0-9]/gi, '_')}`;
                
                const payload = { careerName, semesters };
                const dataStr = JSON.stringify(payload, null, 2);

                try {
                    // Abre la ventana del sistema operativo para elegir dónde guardar
                    if ('showSaveFilePicker' in window) {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: baseName,
                            types: [{
                                description: 'Archivo JSON',
                                accept: {'application/json': ['.json']},
                            }],
                        });
                        const writable = await handle.createWritable();
                        await writable.write(dataStr);
                        await writable.close();
                        setCurrentFileName(handle.name);
                    } else {
                        // Método de respaldo para navegadores antiguos
                        const fileName = prompt("Nombre del archivo (sin extensión):", baseName);
                        if (fileName) {
                            const cleanName = fileName.replace(/\.json$/i, '');
                            const finalName = `${cleanName}.json`;
                            setCurrentFileName(finalName);
                            downloadJson(payload, finalName);
                        }
                    }
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.error("Error al guardar:", err);
                        alert("Ocurrió un error al guardar el archivo.");
                    }
                }
            };

            const handleLoad = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const loadedData = JSON.parse(event.target.result);
                        setCurrentFileName(file.name);
                        if (loadedData.careerName && loadedData.semesters) {
                            setCareerName(loadedData.careerName);
                            setSemesters(loadedData.semesters);
                        } else if (Array.isArray(loadedData)) {
                            setSemesters(loadedData);
                        }
                    } catch (error) {
                        alert("Error al leer el archivo. Asegúrate que sea un JSON válido.");
                    }
                };
                reader.readAsText(file);
                e.target.value = ''; 
            };

            const handlePrint = () => window.print();

            const addCourse = (semesterId) => {
                setSemesters(semesters.map(sem => {
                    if (sem.id === semesterId) {
                        return { ...sem, courses: [...sem.courses, { id: Date.now().toString(), name: 'Nueva Asignatura', dd: 0, ta: 0, isLocked: false }] };
                    }
                    return sem;
                }));
            };

            const removeCourse = (semesterId, courseId) => {
                setSemesters(semesters.map(sem => {
                    if (sem.id === semesterId) {
                        return { ...sem, courses: sem.courses.filter(c => c.id !== courseId) };
                    }
                    return sem;
                }));
            };

            const updateCourse = (semesterId, courseId, field, value) => {
                setSemesters(semesters.map(sem => {
                    if (sem.id === semesterId) {
                        return { ...sem, courses: sem.courses.map(c => c.id === courseId ? { ...c, [field]: value } : c) };
                    }
                    return sem;
                }));
            };

            const toggleLockCourse = (semesterId, courseId) => {
                setSemesters(semesters.map(sem => {
                    if (sem.id === semesterId) {
                        return { ...sem, courses: sem.courses.map(c => c.id === courseId ? { ...c, isLocked: !c.isLocked } : c) };
                    }
                    return sem;
                }));
            };

            const calculateSemesterStats = (courses) => {
                return courses.reduce((acc, course) => {
                    return {
                        sct: acc.sct + calcularSCT(course.dd, course.ta),
                        dd: acc.dd + (Number(course.dd) || 0),
                        ta: acc.ta + (Number(course.ta) || 0)
                    };
                }, { sct: 0, dd: 0, ta: 0 });
            };

            const getYearlySCT = (semesterId) => {
                const isOdd = semesterId % 2 !== 0;
                const pairId = isOdd ? semesterId + 1 : semesterId - 1;
                const currentSem = semesters.find(s => s.id === semesterId);
                const pairedSem = semesters.find(s => s.id === pairId);

                const currentSCT = currentSem ? calculateSemesterStats(currentSem.courses).sct : 0;
                const pairedSCT = pairedSem ? calculateSemesterStats(pairedSem.courses).sct : 0;

                return currentSCT + pairedSCT;
            };

            const careerStats = React.useMemo(() => {
                return semesters.reduce((acc, sem) => {
                    const sStats = calculateSemesterStats(sem.courses);
                    return {
                        sct: acc.sct + sStats.sct,
                        dd: acc.dd + sStats.dd,
                        ta: acc.ta + sStats.ta
                    };
                }, { sct: 0, dd: 0, ta: 0 });
            }, [semesters]);

            const saveCareerName = () => {
                const finalName = tempCareerName.trim();
                setCareerName(finalName || 'Planificador de Plan de Estudio');
                setIsEditingCareer(false);
            };

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col font-sans">
                    <header className="bg-slate-900 text-white p-4 shadow-md shrink-0 no-print">
                        <div className="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
                            
                            {/* Editor del nombre de la carrera */}
                            <div className="flex items-center gap-3 w-full sm:w-auto">
                                <i className="ph ph-book-open text-blue-400 text-3xl shrink-0"></i>
                                <div className="flex-1 min-w-0">
                                    {isEditingCareer ? (
                                        <div className="flex items-center gap-2">
                                            <input 
                                                type="text" 
                                                value={tempCareerName}
                                                onChange={(e) => setTempCareerName(e.target.value)}
                                                onKeyDown={(e) => e.key === 'Enter' && saveCareerName()}
                                                className="text-slate-900 px-2 py-1 rounded text-lg sm:text-xl font-bold w-full sm:w-80 outline-none focus:ring-2 focus:ring-blue-500"
                                                autoFocus
                                            />
                                            <button onClick={saveCareerName} className="text-green-400 hover:text-green-300 transition-colors" title="Guardar nombre">
                                                <i className="ph-fill ph-check-circle text-2xl"></i>
                                            </button>
                                            <button onClick={() => setIsEditingCareer(false)} className="text-red-400 hover:text-red-300 transition-colors" title="Cancelar">
                                                <i className="ph-fill ph-x-circle text-2xl"></i>
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="flex items-center gap-2 group">
                                            <h1 className="text-xl font-bold tracking-tight text-white">{careerName}</h1>
                                            <button 
                                                onClick={() => {
                                                    setTempCareerName(careerName);
                                                    setIsEditingCareer(true);
                                                }} 
                                                className="text-slate-400 opacity-0 group-hover:opacity-100 hover:text-blue-400 transition-opacity no-print"
                                                title="Editar nombre de la carrera"
                                            >
                                                <i className="ph ph-pencil-simple text-xl"></i>
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="flex flex-wrap gap-2 shrink-0">
                                <button onClick={handleNew} className="flex items-center gap-1.5 bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded text-sm transition-colors border border-slate-700">
                                    <i className="ph ph-file-plus text-lg"></i> <span className="hidden sm:inline">Nuevo</span>
                                </button>
                                
                                <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-1.5 bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded text-sm transition-colors border border-slate-700">
                                    <i className="ph ph-folder-open text-lg"></i> <span className="hidden sm:inline">Abrir</span>
                                </button>
                                <input type="file" accept=".json" ref={fileInputRef} onChange={handleLoad} className="hidden" />

                                <button 
                                    onClick={handleSave} 
                                    className="flex items-center gap-1.5 bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded text-sm transition-colors border border-slate-700" 
                                    title="Guardar cambios"
                                >
                                    <i className="ph ph-floppy-disk text-lg"></i> <span className="hidden sm:inline">Guardar</span>
                                </button>

                                <button onClick={handleSaveAs} className="flex items-center gap-1.5 bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded text-sm transition-colors border border-slate-700" title="Guardar como...">
                                    <i className="ph ph-floppy-disk-back text-lg"></i> <span className="hidden sm:inline">Guardar Como</span>
                                </button>

                                <div className="w-px h-8 bg-slate-700 mx-1 hidden sm:block"></div>
                                <button onClick={handlePrint} className="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm font-semibold transition-colors shadow-sm">
                                    <i className="ph ph-printer text-lg"></i> <span className="hidden sm:inline">Exportar PDF</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Encabezado académico de nivel LaTeX para la impresión */}
                    <div className="hidden print:block text-center mb-5 border-b-2 border-slate-800 pb-2">
                        <div className="flex justify-between items-end">
                            <div className="text-left">
                                <span className="text-[10px] tracking-widest text-slate-500 font-mono uppercase">Documento de Planificación Curricular / Proyecto Educativo</span>
                                <h1 className="text-xl font-bold font-serif text-slate-900 leading-tight">{careerName}</h1>
                            </div>
                            <div className="text-right text-[10px] text-slate-600 font-mono leading-relaxed">
                                <div><strong>SCT Total:</strong> {careerStats.sct} | <strong>Docencia Directa:</strong> {careerStats.dd} hrs | <strong>Trabajo Autónomo:</strong> {careerStats.ta} hrs</div>
                                <div>Emitido el {new Date().toLocaleDateString('es-CL')} • Generado por Planificador de Estudio</div>
                            </div>
                        </div>
                    </div>

                    <main className="flex-1 overflow-x-auto p-6 print:overflow-visible print:p-0">
                        <div className="flex gap-6 items-start pb-4 w-max print-grid">
                            {semesters.map((semester) => {
                                const stats = calculateSemesterStats(semester.courses);
                                const totalHours = stats.dd + stats.ta;
                                const isDDOverLimit = stats.dd > 20;
                                const isTotalOverLimit = totalHours > 48;
                                const isSCTOverLimit = stats.sct > 33;
                                const yearlySCT = getYearlySCT(semester.id);
                                const isYearlySCTOverLimit = yearlySCT > 60;
                                const yearNumber = Math.ceil(semester.id / 2);
                                const hasErrors = isDDOverLimit || isTotalOverLimit || isSCTOverLimit || isYearlySCTOverLimit;

                                return (
                                    <div key={semester.id} className={`bg-slate-200 rounded-xl flex flex-col w-80 shadow-sm border transition-colors print-col ${hasErrors ? 'border-red-400 shadow-red-200 print:border-red-400' : 'border-slate-300'}`}>
                                        
                                        {/* Cabecera de Semestre */}
                                        <div className="p-4 bg-slate-300 rounded-t-xl border-b border-slate-400 flex flex-col gap-3 print:bg-slate-100 print:p-2.5 print:border-slate-300">
                                            <div className="flex justify-between items-start print:items-center">
                                                <h2 className="font-bold text-slate-800 mt-1 print:mt-0 print:text-[11px] print:font-extrabold">{semester.title}</h2>
                                                <div className="flex flex-col items-end print:flex-row print:gap-1.5 print:items-center">
                                                    <span className={`text-xs font-bold px-2 py-1 rounded-full flex items-center gap-1 print:px-1.5 print:py-0.5 print:text-[9px] ${isSCTOverLimit ? 'bg-red-500 text-white print:text-red-700 print:bg-red-50 print:border print:border-red-200' : 'bg-blue-600 text-white print:text-blue-800 print:bg-blue-50 print:border print:border-blue-100'}`} title={isSCTOverLimit ? 'Supera el límite de 33 SCT por semestre' : ''}>
                                                        {stats.sct} SCT
                                                        {isSCTOverLimit && <i className="ph ph-warning text-sm no-print"></i>}
                                                    </span>
                                                    <span className={`text-[10px] mt-1 font-semibold flex items-center gap-1 print:mt-0 print:text-[8px] ${isYearlySCTOverLimit ? 'text-red-600' : 'text-slate-600'}`} title={isYearlySCTOverLimit ? 'Supera el límite de 60 SCT anuales' : ''}>
                                                        Año {yearNumber}: {yearlySCT} SCT
                                                    </span>
                                                </div>
                                            </div>
                                            
                                            {/* Métricas compactas de horas */}
                                            <div className="flex flex-col gap-1.5 text-xs bg-white/50 p-2 rounded-lg print:bg-transparent print:p-0 print:gap-0.5 print:pt-1 print:border-t print:border-slate-200 print:flex-row print:justify-between print:text-[8px] print:text-slate-500">
                                                <div className="flex justify-between items-center print:gap-0.5">
                                                    <span className="text-slate-600 font-medium print:text-[8px]">DD:</span>
                                                    <span className={`font-bold flex items-center gap-1 px-1.5 py-0.5 rounded print:p-0 print:font-bold ${isDDOverLimit ? 'bg-red-100 text-red-700 print:text-red-600 print:bg-transparent' : 'text-slate-700'}`}>
                                                        {stats.dd} hrs
                                                    </span>
                                                </div>
                                                <div className="flex justify-between items-center print:gap-0.5">
                                                    <span className="text-slate-600 font-medium print:text-[8px]">TA:</span>
                                                    <span className="font-bold text-slate-700 pr-1 print:pr-0 print:font-bold">{stats.ta} hrs</span>
                                                </div>
                                                <div className="flex justify-between items-center pt-1.5 mt-0.5 border-t border-slate-300 print:p-0 print:m-0 print:border-none print:gap-0.5">
                                                    <span className="text-slate-700 font-semibold print:font-medium print:text-[8px]">Total:</span>
                                                    <span className={`font-bold flex items-center gap-1 px-1.5 py-0.5 rounded print:p-0 print:font-bold ${isTotalOverLimit ? 'bg-red-100 text-red-700 print:text-red-600 print:bg-transparent' : 'text-slate-800'}`}>
                                                        {totalHours} hrs
                                                    </span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Contenedor de Cursos */}
                                        <div className="p-3 flex flex-col gap-3 overflow-y-auto max-h-[60vh] print:max-h-none print:overflow-visible print-courses-container">
                                            {semester.courses.map((course) => (
                                                <div key={course.id} className={`rounded-lg shadow-sm border p-3 relative group transition-all print:break-inside-avoid print:shadow-none print:p-1.5 print:border-slate-300 ${course.isLocked ? 'bg-slate-50 border-slate-300 print:bg-white' : 'bg-white border-slate-200 hover:shadow-md'}`}>
                                                    
                                                    {/* Botones contextuales (ocultos en impresión) */}
                                                    <div className="absolute top-2 right-2 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity no-print bg-white/90 p-1 rounded">
                                                        <button onClick={() => toggleLockCourse(semester.id, course.id)} className={`hover:text-blue-600 transition-colors ${course.isLocked ? 'text-blue-500 opacity-100' : 'text-slate-400'}`} title={course.isLocked ? "Desbloquear" : "Bloquear edición"}>
                                                            {course.isLocked ? <i className="ph-fill ph-lock-key text-base"></i> : <i className="ph ph-lock-key-open text-base"></i>}
                                                        </button>
                                                        
                                                        {!course.isLocked && (
                                                            <button onClick={() => removeCourse(semester.id, course.id)} className="text-slate-400 hover:text-red-500 transition-colors" title="Eliminar asignatura">
                                                                <i className="ph ph-trash text-base"></i>
                                                            </button>
                                                        )}
                                                    </div>
                                                    
                                                    {/* Nombre del curso: Input interactivo / Texto estático en impresión */}
                                                    <div className="print:hidden">
                                                        <input type="text" value={course.name} disabled={course.isLocked} onChange={(e) => updateCourse(semester.id, course.id, 'name', e.target.value)} className={`w-full font-semibold border-none focus:ring-0 p-0 text-sm mb-3 bg-transparent ${course.isLocked ? 'text-slate-700 cursor-not-allowed' : 'text-slate-800'}`} placeholder="Nombre de la asignatura" />
                                                    </div>
                                                    <div className="hidden print:block font-bold text-[10.5px] text-slate-900 leading-tight mb-1">
                                                        {course.name}
                                                    </div>
                                                    
                                                    {/* Horas del curso: Inputs interactivos / Datos estáticos en impresión */}
                                                    <div className="grid grid-cols-2 gap-2 text-xs print:hidden">
                                                        <div className="flex flex-col">
                                                            <label className="text-slate-500 mb-1">Doc. Directa</label>
                                                            <input type="number" min="0" disabled={course.isLocked} value={course.dd} onChange={(e) => updateCourse(semester.id, course.id, 'dd', e.target.value)} className={`border rounded px-2 py-1 outline-none ${course.isLocked ? 'border-transparent bg-transparent text-slate-700 cursor-not-allowed pl-0 font-medium' : 'border-slate-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white'}`} />
                                                        </div>
                                                        <div className="flex flex-col">
                                                            <label className="text-slate-500 mb-1">Trab. Autónomo</label>
                                                            <input type="number" min="0" disabled={course.isLocked} value={course.ta} onChange={(e) => updateCourse(semester.id, course.id, 'ta', e.target.value)} className={`border rounded px-2 py-1 outline-none ${course.isLocked ? 'border-transparent bg-transparent text-slate-700 cursor-not-allowed pl-0 font-medium' : 'border-slate-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white'}`} />
                                                        </div>
                                                    </div>
                                                    
                                                    {/* Vista de horas impresa compacta */}
                                                    <div className="hidden print:flex justify-between items-center text-[8.5px] text-slate-600 font-mono mt-0.5 pt-0.5 border-t border-slate-100">
                                                        <span>DD: {course.dd}h | TA: {course.ta}h</span>
                                                        <span className="font-bold text-blue-800">SCT {calcularSCT(course.dd, course.ta)}</span>
                                                    </div>
                                                    
                                                    {/* Footer regular de curso en pantalla */}
                                                    <div className="mt-3 pt-2 border-t border-slate-100 flex justify-between items-center print:hidden">
                                                        <span className="text-xs font-medium text-slate-500">SCT:</span>
                                                        <span className="text-sm font-bold text-blue-700 bg-blue-50 px-2 py-0.5 rounded">
                                                            {calcularSCT(course.dd, course.ta)}
                                                        </span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        {/* Añadir Asignatura */}
                                        <div className="p-3 no-print">
                                            <button onClick={() => addCourse(semester.id)} className="w-full flex items-center justify-center gap-2 text-sm text-slate-600 hover:text-slate-900 bg-slate-100 hover:bg-white border border-slate-300 border-dashed rounded-lg py-2 transition-colors">
                                                <i className="ph ph-plus text-base"></i> Añadir Asignatura
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
